name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs to save cost.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (python 3.11)
    runs-on: ubuntu-latest
    # Single version: requires-python = ">=3.11". Re-add 3.12 when you
    # actually target it (and fix the concurrency-test flake then).
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Install with the `custom` extra so the OpenAI-compatible provider's
      # 4 test_llm_planner tests exercise the real `openai` SDK instead of
      # hitting the lazy-import guard (which would make them fail). The extra
      # pulls `openai>=1.0`; everything else is in the base + dev dep groups.
      - name: Sync dependencies (with custom extra for openai)
        working-directory: bin
        run: uv sync --locked --extra custom

      - name: Enforce repository-wide Ruff baseline
        working-directory: bin
        run: uv run --locked ruff check ..

      - name: Run test suite
        working-directory: bin
        env:
          # GitHub Actions sets GITHUB_ACTIONS=true which makes typer/rich
          # set FORCE_TERMINAL=True at import time, injecting ANSI codes into
          # CliRunner output. _TYPER_FORCE_DISABLE_TERMINAL overrides that so
          # --help assertions can match plain flag text (e.g. "--use-llm").
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
        run: uv run pytest -q

      # Coordination benchmark smoke: drives the real anvil CLI against
      # a live SQLite state engine. Uses the venv materialized by `uv sync`
      # above (the harness shells out to `uv run` / the synced CLI).
      - name: Coordination benchmark smoke
        working-directory: bin
        run: uv run python ../benchmarks/run_benchmark.py --scenarios overlapping_files --quick

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Same command Read the Docs effectively runs (.readthedocs.yaml).
      # --strict: any broken relative link or anchor fails the build
      # (source-tree references use absolute GitHub URLs — see the
      # validation note in mkdocs.yml; plan item D5).
      - name: Build docs site
        run: uvx --with-requirements docs/requirements.txt mkdocs build --strict
