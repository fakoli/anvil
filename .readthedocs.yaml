# Read the Docs configuration — https://docs.readthedocs.io/en/stable/config-file/v2.html
# Import the repo at readthedocs.org and it builds from this file; the site
# nav and theme live in mkdocs.yml.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: docs/requirements.txt
