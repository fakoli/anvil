site_name: Anvil
site_description: >-
  The system of record for agent teams — durable, evidence-gated,
  lease-coordinated state for multi-agent software work.
# Canonical site: GitHub Pages (auto-deployed by .github/workflows/docs-pages.yml
# on every docs push to main). Read the Docs also builds via .readthedocs.yaml.
site_url: https://fakoli.github.io/anvil/
repo_url: https://github.com/fakoli/anvil
repo_name: fakoli/anvil
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  icon:
    logo: material/anvil
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details

plugins:
  - search

# Links into the source tree use absolute GitHub URLs (valid on GitHub AND
# on the site); links between docs stay relative. CI builds with --strict,
# so a broken relative link or anchor fails the build (plan item D5, done).
validation:
  links:
    not_found: warn
    absolute_links: ignore
    unrecognized_links: warn

# In the repo but intentionally NOT in the site nav:
#   _positioning.md    — internal source-of-truth, marked "not part of
#                        user-facing docs nav" in its own header
#   backlog/*.prd.md   — machine-ingested PRD data files, not prose
#   research/*         — competitive-intelligence / market research notes;
#                        kept in repo for provenance, not published
#   archive/*          — superseded plans/backlogs/audits; historical only,
#                        see archive/README.md
#   plans/2026-07-07-docs-assessment.md — this restructure's own working
#                        doc; maintainer-only, not part of the site
not_in_nav: |
  _positioning.md
  backlog/anvil-backlog.prd.md
  backlog/multi-prd-revisable.prd.md
  research/2026-06-19-backlog-management-research.md
  research/2026-06-19-maximize-anvil-codex.md
  research/2026-06-19-maximize-anvil-openclaw.md
  research/2026-06-20-agent-fleet-pull-market-landscape.md
  research/2026-06-20-competitive-analysis-agent-state-tools.md
  research/agent-workflow-formats.md
  research/competitor-issue-analysis.md
  research/intent-driven-development-landscape.md
  research/spec-driven-development-synthesis.md
  archive/README.md
  archive/BUILD-REPORT.md
  archive/phase-9-backlog.md
  archive/phase-11-backlog.md
  archive/2026-05-25-phase-8-sync.md
  archive/2026-05-25-phase-9.md
  archive/2026-05-26-phase-10-plugin-audit.md
  archive/2026-06-01-sl1-rr-1-event-sourcing-write-path.md
  archive/2026-05-26-plugin-audit.md
  plans/2026-07-07-docs-assessment.md

